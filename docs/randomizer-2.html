<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lottery Wheel Randomizer</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #22c55e;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            max-width: 900px;
            width: 100%;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 1fr 1fr;
            }
        }

        .wheel-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid var(--danger);
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
        }

        input[type="text"] {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        button {
            padding: 0.75rem 1.2rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-spin { width: 100%; margin-top: 1rem; padding: 1rem; font-size: 1.2rem; }
        .btn-share { background: #f1f5f9; color: #475569; border: 1px solid var(--border); }
        .btn-share:hover { background: #e2e8f0; }

        .name-list-container {
            border: 1px solid var(--border);
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .name-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1rem;
            border-bottom: 1px solid var(--border);
        }

        .name-item:last-child { border-bottom: none; }
        .remove-btn { background: transparent; color: var(--danger); padding: 0.25rem 0.5rem; }
        .remove-btn:hover { color: var(--danger-hover); background: #ffeeef; }

        /* Modal Overlay */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .modal h2 { margin-bottom: 0.5rem; font-size: 1.5rem; }
        .winner-name { font-size: 2rem; font-weight: 800; color: var(--primary); margin: 1rem 0; word-break: break-word; }
        .modal-buttons { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1.5rem; }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { opacity: 0.9; }
        .btn-danger-fill { background: var(--danger); color: white; }
        .btn-danger-fill:hover { background: var(--danger-hover); }
    </style>
</head>
<body>

    <div class="container">
        <!-- Left Side: Visual Wheel -->
        <div class="wheel-section">
            <div class="wheel-container">
                <div class="pointer"></div>
                <canvas id="wheel" width="600" height="600"></canvas>
            </div>
            <button class="btn-primary btn-spin" id="spinBtn" onclick="spinWheel()">SPIN THE WHEEL</button>
        </div>

        <!-- Right Side: Controls & List Management -->
        <div class="controls">
            <div>
                <h2 style="margin-bottom: 0.5rem;">Lottery Setup</h2>
                <p style="color: #64748b; font-size: 0.9rem;">Add names below. Generate a URL to lock in your active list across page refreshes.</p>
            </div>

            <div class="input-group">
                <input type="text" id="nameInput" placeholder="Enter a name..." onkeydown="if(event.key==='Enter') addName()">
                <button class="btn-primary" onclick="addName()">Add</button>
            </div>

            <div class="name-list-container" id="nameList">
                <!-- Dynamic List Items -->
            </div>

            <button class="btn-share" onclick="copyShareableUrl()">🔗 Copy Shareable URL (Query Params)</button>
        </div>
    </div>

    <!-- Popup Result Modal -->
    <div class="modal" id="resultModal">
        <div class="modal-content">
            <h2>🎉 We Have a Winner!</h2>
            <div class="winner-name" id="winnerDisplay">John Doe</div>
            <div class="modal-buttons">
                <button class="btn-success" onclick="closeModal()">Keep Name & Start Again</button>
                <button class="btn-danger-fill" onclick="removeWinnerAndClose()">Remove Name & Start Again</button>
            </div>
        </div>
    </div>

    <script>
        let names = [];
        let currentRotation = 0;
        let isSpinning = false;
        let lastWinnerIndex = null;

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const colors = ['#f43f5e', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#14b8a6', '#6366f1'];

        // Initialize App
        window.onload = function() {
            // 1. Try Loading from Query Params
            const params = new URLSearchParams(window.location.search);
            const queryNames = params.get('names');
            
            if (queryNames) {
                names = queryNames.split(',').map(n => n.trim()).filter(n => n);
            } else {
                // 2. Fallback to LocalStorage
                const localNames = localStorage.getItem('lottery_names');
                if (localNames) {
                    names = JSON.parse(localNames);
                } else {
                    // Default values if empty
                    names = ['Alice', 'Bob', 'Charlie', 'Diana', 'Ethan'];
                }
            }
            
            updateUI();
        };

        function saveToLocalStorage() {
            localStorage.setItem('lottery_names', JSON.stringify(names));
        }

        function drawWheel() {
            const numSegments = names.length;
            const center = canvas.width / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (numSegments === 0) {
                ctx.fillStyle = '#cbd5e1';
                ctx.beginPath();
                ctx.arc(center, center, center - 10, 0, 2 * Math.PI);
                ctx.fill();
                ctx.fillStyle = '#64748b';
                ctx.font = 'bold 30px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('Add names to populate wheel', center, center);
                return;
            }

            const anglePerSegment = (2 * Math.PI) / numSegments;

            names.forEach((name, i) => {
                const startAngle = i * anglePerSegment + currentRotation;
                const endAngle = startAngle + anglePerSegment;

                // Draw Segment Base Slice
                ctx.beginPath();
                ctx.moveTo(center, center);
                ctx.arc(center, center, center - 10, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#ffffff';
                ctx.stroke();

                // Draw Text Label
                ctx.save();
                ctx.translate(center, center);
                ctx.rotate(startAngle + anglePerSegment / 2);
                ctx.textAlign = 'right';
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 24px sans-serif';
                
                // Truncate text if too long
                let renderName = name.length > 12 ? name.substring(0, 10) + '...' : name;
                ctx.fillText(renderName, center - 40, 10);
                ctx.restore();
            });

            // Draw center cap
            ctx.beginPath();
            ctx.arc(center, center, 25, 0, 2 * Math.PI);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.stroke();
        }

        function addName() {
            const input = document.getElementById('nameInput');
            const value = input.value.trim();
            if (value) {
                names.push(value);
                input.value = '';
                saveToLocalStorage();
                updateUI();
            }
        }

        function removeName(index) {
            names.splice(index, 1);
            saveToLocalStorage();
            updateUI();
        }

        function updateUI() {
            // Update List DOM
            const listContainer = document.getElementById('nameList');
            listContainer.innerHTML = '';
            
            names.forEach((name, index) => {
                const item = document.createElement('div');
                item.className = 'name-item';
                item.innerHTML = `
                    <span>${name}</span>
                    <button class="remove-btn" onclick="removeName(${index})">Remove</button>
                `;
                listContainer.appendChild(item);
            });

            document.getElementById('spinBtn').disabled = names.length === 0;
            drawWheel();
        }

        function spinWheel() {
            if (isSpinning || names.length === 0) return;
            isSpinning = true;

            const numSegments = names.length;
            const extraSpins = 5 + Math.floor(Math.random() * 5); // 5 to 10 full loops
            const randomTargetAngle = Math.random() * (2 * Math.PI);
            
            const totalRotationTarget = (extraSpins * 2 * Math.PI) + randomTargetAngle;
            
            let start = null;
            const duration = 4000; // 4 seconds spin animation
            const initialRotation = currentRotation;

            function animate(timestamp) {
                if (!start) start = timestamp;
                const elapsed = timestamp - start;
                const progress = Math.min(elapsed / duration, 1);
                
                // Cubic easing out function for realistic slowdown effect
                const easeOut = 1 - Math.pow(1 - progress, 3);
                
                currentRotation = initialRotation + (totalRotationTarget * easeOut);
                drawWheel();

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    isSpinning = false;
                    
                    // Normalize rotation angle relative to zero point at top center (-Math.PI / 2)
                    const normalizedRotation = (currentRotation % (2 * Math.PI));
                    const pointerAngleOffset = (2.5 * Math.PI - normalizedRotation) % (2 * Math.PI);
                    const anglePerSegment = (2 * Math.PI) / numSegments;
                    
                    lastWinnerIndex = Math.floor(pointerAngleOffset / anglePerSegment) % numSegments;
                    
                    // Display Winner Dialog
                    document.getElementById('winnerDisplay').innerText = names[lastWinnerIndex];
                    document.getElementById('resultModal').style.display = 'flex';
                }
            }

            requestAnimationFrame(animate);
        }

        function closeModal() {
            document.getElementById('resultModal').style.display = 'none';
        }

        function removeWinnerAndClose() {
            if (lastWinnerIndex !== null) {
                removeName(lastWinnerIndex);
                lastWinnerIndex = null;
            }
            closeModal();
        }

        function copyShareableUrl() {
            const baseUrl = window.location.origin + window.location.pathname;
            const params = new URLSearchParams();
            if (names.length > 0) {
                params.set('names', names.join(','));
            }
            const finalUrl = `${baseUrl}?${params.toString()}`;

            navigator.clipboard.writeText(finalUrl).then(() => {
                alert('Shareable URL copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        }
    </script>
</body>
</html>
